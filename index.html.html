<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Budget Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        padding: 20px;
        color: #333;
    }

    .container {
        max-width: 800px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }

    input, select, button {
        padding: 10px;
        margin: 5px 0;
        width: 100%;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
    }

    button {
        background: #667eea;
        color: white;
        border: none;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #5563d6;
    }

    .expense-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f4f6ff;
        padding: 10px;
        border-radius: 8px;
        margin: 5px 0;
    }

    .delete-btn {
        background: red;
        padding: 5px 8px;
        border-radius: 6px;
        font-size: 12px;
    }

    .summary {
        margin-top: 20px;
        padding: 15px;
        background: #eef2ff;
        border-radius: 10px;
    }

    canvas {
        margin-top: 20px;
    }

    .positive { color: green; }
    .negative { color: red; }
</style>
</head>
<body>

<div class="container">
    <h1>💰 Monthly Budget Pro</h1>

    <label>Monthly Income</label>
    <input type="number" id="income" placeholder="Masukkan pemasukan">

    <hr>

    <label>Nama Pengeluaran</label>
    <input type="text" id="expenseName" placeholder="Contoh: Makan">

    <label>Kategori</label>
    <select id="category">
        <option>Makan</option>
        <option>Transport</option>
        <option>Hiburan</option>
        <option>Tagihan</option>
        <option>Belanja</option>
        <option>Lainnya</option>
    </select>

    <label>Jumlah</label>
    <input type="number" id="expenseAmount" placeholder="Jumlah pengeluaran">

    <button onclick="addExpense()">Tambah</button>

    <div id="expenseList"></div>

    <div class="summary">
        <p>Total Pengeluaran: <strong id="totalExpense">Rp 0</strong></p>
        <p>Sisa Uang: <strong id="remaining">Rp 0</strong></p>
    </div>

    <canvas id="budgetChart"></canvas>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let income = localStorage.getItem("income") || 0;

document.getElementById("income").value = income;

const ctx = document.getElementById('budgetChart').getContext('2d');
let chart;

function saveData() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
    localStorage.setItem("income", document.getElementById("income").value);
}

function addExpense() {
    const name = document.getElementById("expenseName").value;
    const amount = parseFloat(document.getElementById("expenseAmount").value);
    const category = document.getElementById("category").value;

    if (!name || isNaN(amount)) return alert("Isi data dengan benar!");

    expenses.push({ name, amount, category });
    document.getElementById("expenseName").value = "";
    document.getElementById("expenseAmount").value = "";

    saveData();
    render();
}

function deleteExpense(index) {
    expenses.splice(index, 1);
    saveData();
    render();
}

function render() {
    const list = document.getElementById("expenseList");
    list.innerHTML = "";

    let total = 0;
    let categoryTotals = {};

    expenses.forEach((expense, index) => {
        total += expense.amount;

        if (!categoryTotals[expense.category]) {
            categoryTotals[expense.category] = 0;
        }
        categoryTotals[expense.category] += expense.amount;

        const div = document.createElement("div");
        div.className = "expense-item";
        div.innerHTML = `
            <span>${expense.name} (${expense.category}) - Rp ${expense.amount.toLocaleString()}</span>
            <button class="delete-btn" onclick="deleteExpense(${index})">Hapus</button>
        `;
        list.appendChild(div);
    });

    document.getElementById("totalExpense").innerText =
        "Rp " + total.toLocaleString();

    const incomeVal = parseFloat(document.getElementById("income").value) || 0;
    const remaining = incomeVal - total;

    const remainingEl = document.getElementById("remaining");
    remainingEl.innerText = "Rp " + remaining.toLocaleString();
    remainingEl.className = remaining < 0 ? "negative" : "positive";

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(categoryTotals),
            datasets: [{
                data: Object.values(categoryTotals),
                backgroundColor: [
                    '#667eea','#764ba2','#f093fb','#f5576c','#4facfe','#43e97b'
                ]
            }]
        }
    });
}

document.getElementById("income").addEventListener("input", () => {
    saveData();
    render();
});

render();
</script>

</body>
</html>
